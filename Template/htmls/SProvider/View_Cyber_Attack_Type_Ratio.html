{% extends 'SProvider/design1.html' %}
{% block researchblock %}

<style>

/* WRAPPER */
.ratio-wrapper{
    display:flex;
    justify-content:center;
    margin-top:30px;
}

/* CARD */
.ratio-card{
    width:100%;
    max-width:600px;
    background:#020617;
    border:1px solid #00ffe7;
    border-radius:10px;
    padding:30px;
    box-shadow:0 0 25px #00ffe744;
}

/* TITLE */
.ratio-title{
    text-align:center;
    font-size:20px;
    color:#00ffe7;
    margin-bottom:25px;
    text-shadow:0 0 10px #00ffe7;
}

/* TABLE */
.ratio-table{
    width:100%;
    border-collapse:collapse;
}

/* HEADERS */
.ratio-table th{
    background:#00ffe7;
    color:#000;
    padding:12px;
    font-size:14px;
}

/* ROWS */
.ratio-table td{
    padding:12px;
    text-align:center;
    color:#7df9ff;
    border-bottom:1px solid #00ffe722;
    font-size:15px;
}

/* HOVER */
.ratio-table tr:hover{
    background:#00ffe711;
}

/* RATIO BADGE */
.ratio-badge{
    background:#00ffe7;
    color:#000;
    padding:4px 10px;
    border-radius:4px;
    font-weight:bold;
}

</style>

<div class="ratio-wrapper">

<div class="ratio-card">

<div class="ratio-title">
View Cyber Attack Found Ratio Details
</div>

<table class="ratio-table">
<tr>
<th>Cyber Attack Type</th>
<th>Ratio</th>
</tr>

{% for object in objs %}
<tr>
<td>{{object.names}}</td>
<td>
<span class="ratio-badge">{{object.ratio}}</span>
</td>
</tr>
{% endfor %}

</table>

</div>
</div>

{% endblock %}
