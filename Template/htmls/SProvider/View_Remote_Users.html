{% extends 'SProvider/design1.html' %}
{% block researchblock %}

<style>
body{
    background:#020617;
    font-family:'Orbitron', sans-serif;
    color:#00ffe7;
}

/* WRAPPER */
.users-wrapper{
    padding:40px;
}

/* TITLE */
.users-title{
    text-align:center;
    font-size:22px;
    margin-bottom:25px;
    text-shadow:0 0 12px #00ffe7;
}

/* CARD */
.users-card{
    background:rgba(2,6,23,0.85);
    border:1px solid #00ffe7;
    border-radius:12px;
    padding:25px;
    backdrop-filter: blur(8px);
    box-shadow:0 0 25px #00ffe733;
}

/* TABLE */
.users-table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}

.users-table th{
    padding:12px;
    background:#00ffe7;
    color:black;
    text-align:center;
}

.users-table td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #00ffe733;
}

/* ROW HOVER */
.users-table tr:hover{
    background:#00ffe711;
}

/* FADE ANIMATION */
.users-card{
    animation:fadeIn .7s ease;
}
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px)}
    to{opacity:1; transform:translateY(0)}
}
</style>

<div class="users-wrapper">

<div class="users-title">
All Registered Remote Users
</div>

<div class="users-card">

<table class="users-table">

<tr>
    <th>USER NAME</th>
    <th>EMAIL</th>
    <th>Mob No</th>
    <th>Country</th>
    <th>State</th>
    <th>City</th>
</tr>

{% for o in objects %}
<tr>
    <td>{{o.username}}</td>
    <td>{{o.email}}</td>
    <td>{{o.phoneno}}</td>
    <td>{{o.country}}</td>
    <td>{{o.state}}</td>
    <td>{{o.city}}</td>
</tr>
{% endfor %}

</table>

</div>
</div>

{% endblock %}
