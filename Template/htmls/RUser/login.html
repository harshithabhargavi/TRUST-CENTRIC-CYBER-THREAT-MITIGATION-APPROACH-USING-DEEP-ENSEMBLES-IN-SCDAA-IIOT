{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>IIoT Cyber Defense</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:black;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#00ffe7;
    overflow:hidden;
}

/* Matrix canvas */
#matrix {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* Cyber Box */
.cyber-box {
    background:#0f172a;
    border:1px solid #00ffe7;
    padding:40px;
    width:380px;
    border-radius:10px;
    box-shadow:0 0 25px #00ffe7aa;
    text-align:center;
}

/* Title */
.title {
    font-size:18px;
    font-weight:bold;
}

/* Typing text */
#typing {
    font-size:12px;
    color:#94fdf4;
    margin:10px 0 20px;
    min-height:18px;
}

/* Inputs */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#020617;
    border:1px solid #00ffe7;
    color:#00ffe7;
    border-radius:5px;
}

input::placeholder {
    color:#22d3ee;
}

/* Main Button */
.login-btn {
    width:100%;
    padding:12px;
    background:#00ffe7;
    color:black;
    font-weight:bold;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* Secondary buttons */
.row-btns {
    display:flex;
    gap:10px;
    margin-top:20px;
}

.secondary-btn {
    flex:1;
    padding:10px;
    border:1px solid #00ffe7;
    background:transparent;
    color:#00ffe7;
    border-radius:5px;
    cursor:pointer;
}
.secondary-btn:hover {
    background:#00ffe722;
}
</style>
</head>

<body>

<!-- MATRIX BACKGROUND -->
<canvas id="matrix"></canvas>

<div class="cyber-box">

<div class="title">Trustcentric Industrial IoT CyberThreat Detection System</div>

<div id="typing"></div>

<form method="POST">
{% csrf_token %}
<input type="text" name="username" placeholder="Enter Username" required>
<input type="password" name="password" placeholder="Enter Password" required>
<button type="submit" class="login-btn">ACCESS SYSTEM</button>

</form>

<div class="row-btns">
<a href="{% url 'serviceproviderlogin' %}">
<button class="secondary-btn">Admin Panel</button>
</a>

<a href="{% url 'Register1' %}">
<button class="secondary-btn">New User</button>
</a>
</div>

</div>

<!-- MATRIX SCRIPT -->
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const matrix = letters.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let i = 0; i < columns; i++) drops[i] = 1;

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff9d";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = matrix[Math.floor(Math.random() * matrix.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

<!-- TYPING EFFECT -->
<script>
const text = "Initializing Industrial IoT Cyber Defense System...";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();
</script>

</body>
</html>
